<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="description" content="Konversi harga barang favoritmu ke satuan biaya harian program Makan Bergizi Gratis Nasional.">
    <meta property="og:title" content="Kalkulator Skala MBG Nasional">
    <meta property="og:description" content="Berapa lama harga Lamborghini-mu bisa membiayai program makan gratis se-Indonesia?">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator MBG - Latihan Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Konverter Satuan MBG 🍱</h1>
        <p class="text-xs text-gray-500 mt-2"> Dasar Konversi: 1 MBG = <span id="policyInfo" class="font-bold">...</span> </p>

        <div id="catalogContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            </div> <div class="border-t pt-6">
            <div class="flex gap-2 mb-4">
                <select id="currencyInput" class="border rounded-lg p-2 bg-gray-50">
                    <option value="IDR">IDR</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
                <input type="number" id="priceInput" placeholder="Masukkan harga..."
                    class="flex-1 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div id="resultBox" class="hidden bg-blue-700 text-white p-6 rounded-xl text-center">
                <p class="text-sm opacity-80 mb-1 font-medium uppercase tracking-wider">Setara Dengan</p>
                <h2 id="mbgResult" class="text-4xl font-black mb-2">0 MBG</h2>
                <p id="timeDescription" class="text-sm italic opacity-90 border-t border-blue-400 pt-2"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
